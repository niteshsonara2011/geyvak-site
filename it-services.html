<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Geyvak.com | Under Maintenance</title>
  <meta name="description" content="Geyvak.com is temporarily under maintenance. Please email hello@geyvak.com for urgent enquiries.">
  <meta name="robots" content="noindex, nofollow">
  <style>
    :root{--green:#0f3b22;--gold:#b08a36;--cream:#fffaf2;--soft:#f4eadc;--ink:#102016;--muted:#627168;--line:#e7dccb;--white:#fff;--shadow:0 26px 90px -38px rgba(15,59,34,.6)}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;line-height:1.65;color:var(--ink);background:radial-gradient(circle at 84% 0,rgba(176,138,54,.18),transparent 34%),radial-gradient(circle at 10% 92%,rgba(15,59,34,.12),transparent 36%),var(--cream);padding:28px}
    main{width:min(780px,100%);background:rgba(255,255,255,.72);border:1px solid var(--line);border-radius:34px;box-shadow:var(--shadow);padding:clamp(30px,6vw,58px);text-align:center}
    .eyebrow{color:var(--gold);font-size:12px;font-weight:900;letter-spacing:.16em;text-transform:uppercase;margin-bottom:14px}
    h1{font-family:Georgia,"Times New Roman",serif;font-weight:400;letter-spacing:-.04em;font-size:clamp(2.4rem,7vw,5.2rem);line-height:1;margin:0 0 20px;color:var(--green)}
    p{font-size:clamp(1rem,2vw,1.18rem);color:#243a2d;margin:0 auto 18px;max-width:600px}
    .note{color:var(--muted);font-size:.95rem;margin-top:22px}
    a{display:inline-flex;align-items:center;justify-content:center;min-height:48px;padding:13px 22px;border-radius:999px;background:var(--green);color:var(--cream);text-decoration:none;font-weight:850;margin-top:16px}
    footer{margin-top:30px;color:var(--muted);font-size:.86rem}
  </style>
</head>
<body>
  <main aria-labelledby="maintenance-title">
    <div class="eyebrow">Geyvak.com</div>
    <h1 id="maintenance-title">We are under maintenance.</h1>
    <p>Geyvak.com is being refreshed with care. The site will return once the update is ready.</p>
    <p>For urgent enquiries, please contact us by email.</p>
    <a href="mailto:hello@geyvak.com">hello@geyvak.com</a>
    <p class="note">Thank you for your patience.</p>
    <footer>Technology with roots. Service with care.</footer>
  </main>
</body>
</html>
