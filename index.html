<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="theme-color" content="#0F3B22" />
  <title>Geyvak.com — Under Maintenance</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,500;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --green: #0f3b22;
      --gold: #b08a36;
      --cream: #fffaf2;
      --soft: #f4eadc;
      --ink: #102016;
      --muted: #627168;
      --line: #e7dccb;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 28px;
      color: var(--ink);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 80% 10%, rgba(176, 138, 54, 0.18), transparent 34%),
        radial-gradient(circle at 18% 88%, rgba(15, 59, 34, 0.12), transparent 32%),
        var(--cream);
    }

    main {
      width: min(100%, 780px);
      text-align: center;
      border: 1px solid var(--line);
      border-radius: 36px;
      padding: clamp(34px, 6vw, 72px);
      background: rgba(255, 250, 242, 0.88);
      box-shadow: 0 28px 80px -45px rgba(15, 59, 34, 0.55);
    }

    .mark {
      width: 92px;
      height: 92px;
      margin: 0 auto 24px;
      display: block;
    }

    .eyebrow {
      margin: 0 0 14px;
      color: var(--gold);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      color: var(--green);
      font-family: Fraunces, Georgia, serif;
      font-size: clamp(2.4rem, 7vw, 4.8rem);
      font-weight: 400;
      letter-spacing: -0.04em;
      line-height: 1.02;
    }

    p {
      margin: 22px auto 0;
      max-width: 590px;
      color: var(--muted);
      font-size: clamp(1rem, 2vw, 1.18rem);
      line-height: 1.75;
    }

    .notice {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 32px;
      padding: 12px 18px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--soft);
      color: var(--green);
      font-size: 14px;
      font-weight: 700;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--gold);
    }

    footer {
      margin-top: 34px;
      color: var(--muted);
      font-size: 13px;
    }
  </style>
</head>
<body>
  <main aria-labelledby="maintenance-title">
    <svg class="mark" viewBox="0 0 120 120" role="img" aria-label="Geyvak icon">
      <path d="M72 17c16 18 9 33-3 44 13-7 30-5 42 5-20 2-32 8-40 21l-9 15H47c-25 0-43-18-43-42s18-42 43-42c18 0 32 9 38 23H68c-5-7-12-10-21-10-16 0-28 12-28 29s12 29 28 29h21l7-12c-7-8-12-20-3-60z" fill="#0f3b22"/>
      <path d="M21 54h23m-18-12h28m-20-12h24" stroke="#b08a36" stroke-width="4" stroke-linecap="round"/>
      <circle cx="48" cy="54" r="4" fill="#b08a36"/>
      <circle cx="58" cy="42" r="4" fill="#b08a36"/>
      <circle cx="64" cy="30" r="4" fill="#b08a36"/>
      <path d="M58 101c-4 13-13 16-24 20m24-20c0 15 0 21-8 29m8-29c8 15 12 20 26 26" stroke="#b08a36" stroke-width="2" stroke-linecap="round" fill="none"/>
    </svg>

    <p class="eyebrow">Temporary notice</p>
    <h1 id="maintenance-title">Geyvak is under maintenance.</h1>
    <p>
      We are polishing the website and making it clearer, calmer, and more useful.
      Please visit again soon.
    </p>

    <div class="notice" aria-label="Maintenance status">
      <span class="dot" aria-hidden="true"></span>
      Website temporarily unavailable while we improve it
    </div>

    <footer>
      Geyvak.com · Technology with roots. Service with care.
    </footer>
  </main>
</body>
</html>
