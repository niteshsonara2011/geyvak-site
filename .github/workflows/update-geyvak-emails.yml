name: One-time update Geyvak emails

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/update-geyvak-emails.yml'

permissions:
  contents: write

jobs:
  update-emails:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Replace website email addresses
        run: |
          find . -type f \( -name "*.html" -o -name "*.md" -o -name "*.txt" -o -name "*.js" -o -name "*.css" \) -print0 | xargs -0 sed -i -E \
            -e 's/[Ee]nquire@geyvak\.com/hello@geyvak.com/g' \
            -e 's/geyvaksevak@gmail\.com/hello@geyvak.com/g' \
            -e 's/geyvakreva@geyvak\.com/hello@geyvak.com/g'
          rm -f .github/workflows/update-geyvak-emails.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No email changes found."
          else
            git commit -m "Update website emails to hello@geyvak.com"
            git push
          fi
